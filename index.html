<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f8bbd9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Naraz Hoo??</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    /* 100vh ki jagah 100dvh use kiya — iOS Safari mein address bar ke saath properly kaam karta hai */
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 30%, #e1bee7 60%, #fce4ec 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    transition: opacity 0.8s ease;
    /* Safe area — notch wale phones ke liye */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body.fading { opacity: 0; }

  .container {
    text-align: center;
    padding: 1.5rem 1rem;
    max-width: 500px;
    width: 100%;
  }

  h1 {
    font-size: clamp(2rem, 10vw, 4rem);
    color: #b5125a;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    line-height: 1.1;
    word-break: break-word;
  }

  .buttons-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 80px;
    margin-top: 2rem;
    padding: 0 0.5rem;
  }

  .btn-angry {
    position: fixed;
    z-index: 999;
    padding: 0.7rem 1.3rem;
    border-radius: 14px;
    border: 2px solid #ffcdd2;
    font-size: clamp(0.8rem, 3.5vw, 0.95rem);
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    white-space: nowrap;
    background: #fff;
    color: #d32f2f;
    box-shadow: 0 2px 0px #ffcdd2, 0 4px 16px rgba(211,47,47,0.12);
    transition: transform 0.15s ease;
    /* Mobile pe touch smooth ho */
    touch-action: manipulation;
    max-width: calc(100vw - 40px);
  }

  .btn-happy {
    padding: 0.7rem 1.3rem;
    border-radius: 14px;
    border: 2px solid #f48fb1;
    font-size: clamp(0.8rem, 3.5vw, 0.95rem);
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    white-space: nowrap;
    background: #fff;
    color: #c2185b;
    box-shadow: 0 2px 0px #f48fb1, 0 4px 16px rgba(194,24,91,0.12);
    transition: all 0.2s ease;
    touch-action: manipulation;
    max-width: calc(100vw - 40px);
  }

  .btn-happy:active {
    transform: translateY(1px);
    background: #fce4ec;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .overlay.active { display: flex; }

  .popup {
    background: white;
    border-radius: 24px;
    padding: 2rem 1.5rem;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 60px rgba(194,24,91,0.2);
    animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .popup-cat {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: catBounce 1.2s ease-in-out infinite;
  }

  @keyframes catBounce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%       { transform: translateY(-8px) rotate(4deg); }
  }

  .popup h2 {
    font-size: clamp(1rem, 4.5vw, 1.3rem);
    color: #b5125a;
    font-weight: 800;
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }

  .popup p {
    font-size: clamp(0.82rem, 3.5vw, 0.92rem);
    color: #999;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .btn-okay {
    background: #fff;
    color: #c2185b;
    padding: 0.6rem 2rem;
    border-radius: 12px;
    border: 2px solid #f48fb1;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 0px #f48fb1;
    transition: all 0.15s ease;
    touch-action: manipulation;
  }

  .btn-okay:active {
    transform: translateY(1px);
    background: #fce4ec;
  }

  .btn-okay:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .closing-msg {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    color: #b5125a;
    font-size: clamp(1.1rem, 5vw, 1.5rem);
    font-weight: 700;
    text-align: center;
    padding: 1rem;
    animation: fadeIn 0.4s ease;
  }

  .closing-msg.active { display: flex; }

  .closing-msg span {
    background: rgba(255,255,255,0.95);
    padding: 1.2rem 1.8rem;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(194,24,91,0.2);
    max-width: 90vw;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Chhoti screens ke liye extra adjustments */
  @media (max-width: 400px) {
    .container { padding: 1rem 0.75rem; }
    .buttons-row { gap: 0.6rem; margin-top: 1.5rem; }
    .popup { padding: 1.5rem 1rem; border-radius: 20px; }
    .popup-cat { font-size: 2.5rem; }
  }

  /* Landscape mode fix */
  @media (max-height: 500px) and (orientation: landscape) {
    body { align-items: flex-start; padding-top: 1rem; }
    .popup { max-height: 95vh; padding: 1rem; }
    .popup-cat { font-size: 2rem; margin-bottom: 0.3rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>NARAZ HO??</h1>
  <div class="buttons-row">
    <button class="btn-angry" id="angryBtn">😤 Hoon Naraz Abhi Bhi</button>
    <button class="btn-happy" onclick="showPopup()">😊 Nhi Hoon Naraz Ab Mai</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <span class="popup-cat">🐱</span>
    <h2>Thank you so much Billiyon ki Queen</h2>
    <p>Aagy se esi galti nhi hogi<br>promise pakka! 🌸</p>
    <button class="btn-okay" id="okayBtn" onclick="closePopup()">Okay</button>
  </div>
</div>

<div class="closing-msg" id="closingMsg">
  <span>Byeeeee Billiyon ki Queen 🌸<br>Website band ho rahi hai...</span>
</div>

<script>
  const btn = document.getElementById('angryBtn');
  let placed = false;

  function initBtn() {
    const r = btn.getBoundingClientRect();
    btn.style.left = r.left + 'px';
    btn.style.top  = r.top  + 'px';
    placed = true;
  }

  function placeAway(mouseX, mouseY) {
    const margin = 15;
    const bw = btn.offsetWidth  || 180;
    const bh = btn.offsetHeight || 50;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;

    // Agar screen itni chhoti ho ke button fit hi na ho
    if (maxX < margin || maxY < margin) {
      btn.style.left = margin + 'px';
      btn.style.top  = margin + 'px';
      return;
    }

    const cx = parseFloat(btn.style.left) + bw / 2;
    const cy = parseFloat(btn.style.top)  + bh / 2;

    let dx = cx - mouseX;
    let dy = cy - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    dx /= dist; dy /= dist;

    // Mobile pe kam door bhage, desktop pe zyada
    const flee = Math.min(250, Math.min(window.innerWidth, window.innerHeight) * 0.4);
    let nx = cx + dx * flee - bw / 2;
    let ny = cy + dy * flee - bh / 2;

    // Agar bounds se bahar ja raha hai to random jagah
    if (nx < margin || nx > maxX || ny < margin || ny > maxY) {
      nx = margin + Math.random() * (maxX - margin);
      ny = margin + Math.random() * (maxY - margin);
    }

    nx = Math.max(margin, Math.min(maxX, nx));
    ny = Math.max(margin, Math.min(maxY, ny));

    btn.style.left = nx + 'px';
    btn.style.top  = ny + 'px';
  }

  // Mouse support (desktop)
  document.addEventListener('mousemove', function(e) {
    if (!placed) initBtn();
    const r = btn.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    if (Math.sqrt(dx*dx + dy*dy) < 150) placeAway(e.clientX, e.clientY);
  });

  // Touch support (mobile) — improved
  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!placed) initBtn();
    const t = e.touches[0];
    placeAway(t.clientX, t.clientY);
  }, { passive: false });

  // Fallback click
  btn.addEventListener('click', function(e) {
    if (!placed) initBtn();
    placeAway(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2);
  });

  // Resize pe button ko wapas bounds mein lao
  window.addEventListener('resize', function() {
    if (placed) {
      const margin = 15;
      const bw = btn.offsetWidth;
      const bh = btn.offsetHeight;
      const maxX = window.innerWidth  - bw - margin;
      const maxY = window.innerHeight - bh - margin;
      let x = parseFloat(btn.style.left);
      let y = parseFloat(btn.style.top);
      x = Math.max(margin, Math.min(maxX, x));
      y = Math.max(margin, Math.min(maxY, y));
      btn.style.left = x + 'px';
      btn.style.top  = y + 'px';
    }
  });

  function showPopup() {
    document.getElementById('overlay').classList.add('active');
  }

  function closePopup() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('okayBtn').disabled = true;
    document.getElementById('closingMsg').classList.add('active');

    setTimeout(function() {
      document.body.classList.add('fading');

      setTimeout(function() {
        try {
          window.open('', '_self');
          window.close();
        } catch(e) {}

        setTimeout(function() {
          document.body.innerHTML = '';
          document.title = '';
          try { window.location.replace('about:blank'); } catch(e) {}
        }, 400);
      }, 800);
    }, 2000);
  }
</script>
</body>
</html>
